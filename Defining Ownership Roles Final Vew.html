  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

"<!DOCTYPE html>\n<html lang=\"en\"><head>\n<meta charset=\"UTF-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n<title>CrossFit Woolwich, Defining Ownership Roles<\u002Ftitle>\n<style>/* ============================================================\n   CrossFit Woolwich — Defining Ownership Roles (Homework)\n   Best Hour Affiliate University · Assignment 01\n   Neutral black & white. Square structure, boxed content only.\n   Neue Haas Grotesk Display + Space Mono.\n   ============================================================ */\n\n@font-face{font-family:'Neue Haas Display';src:url(\"ad1d63df-161f-472f-b2de-e4297e6738b6\") format('truetype');font-weight:300;font-style:normal;font-display:swap;}\n@font-face{font-family:'Neue Haas Display';src:url(\"fca84b08-2a5d-4787-9ef6-60af8619f933\") format('truetype');font-weight:400;font-style:normal;font-display:swap;}\n@font-face{font-family:'Neue Haas Display';src:url(\"963efda1-d978-47d3-960b-c6dae4096bf0\") format('truetype');font-weight:500;font-style:normal;font-display:swap;}\n@font-face{font-family:'Neue Haas Display';src:url(\"8e819b63-2129-4e01-a392-b92e8c57bd1f\") format('truetype');font-weight:700;font-style:normal;font-display:swap;}\n@font-face{font-family:'Neue Haas Display';src:url(\"76ec49a3-a4ab-4e98-90f8-d5ff81923bce\") format('truetype');font-weight:800 900;font-style:normal;font-display:swap;}\n@font-face{font-family:'Space Mono';src:url(\"ef24b798-f9bc-4177-80d9-50bc823c5bfc\") format('woff2');font-weight:400;font-style:normal;font-display:swap;}\n@font-face{font-family:'Space Mono';src:url(\"cc5bb34c-2766-4af8-b5b9-4b35e833828f\") format('woff2');font-weight:700;font-style:normal;font-display:swap;}\n\n:root{\n  --font-display:'Neue Haas Display','Helvetica Neue',Helvetica,Arial,sans-serif;\n  --font-text:'Neue Haas Display','Helvetica Neue',Helvetica,Arial,sans-serif;\n  --font-mono:'Space Mono',ui-monospace,'SF Mono',Menlo,monospace;\n\n  /* neutral, warm-leaning ink — no blue */\n  --ink:#1A1815;\n  --ink-85:#2E2B27;\n  --ink-70:#56524B;\n  --ink-60:#6E6960;\n  --ink-50:#8A857B;\n  --paper:#F4F3EF;\n  --card:#FCFBF8;\n  --card-2:#EFEDE6;\n  --bd:#E2DFD6;\n  --bd-2:#D3CFC4;\n  --d-bd:rgba(244,243,239,.16);\n  --d-soft:rgba(244,243,239,.06);\n  --d-mute:#ADA89E;\n\n  --r-card:8px;\n  --r-sm:5px;\n  --pill:999px;\n  --sh-1:0 1px 2px rgba(26,24,21,.06);\n  --sh-2:0 12px 34px -16px rgba(26,24,21,.20);\n\n  --pad:clamp(30px,5vw,66px);\n  --sheet-w:1010px;\n}\n\n*{box-sizing:border-box;margin:0;padding:0;}\nhtml{scroll-behavior:smooth;}\nbody{\n  background:#2A2825;color:var(--ink);\n  font-family:var(--font-text);font-weight:400;\n  -webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;line-height:1.55;\n}\nimg{display:block;max-width:100%;}\n::selection{background:var(--ink);color:var(--paper);}\n\n.mono{font-family:var(--font-mono);font-weight:400;}\n.kicker{font-family:var(--font-mono);font-size:11px;font-weight:400;letter-spacing:.18em;text-transform:uppercase;color:var(--ink-60);}\nh1,h2,h3,h4,h5{font-family:var(--font-display);letter-spacing:-.02em;font-weight:700;line-height:1.06;}\n\n/* ============================================================ SHEETS */\n.doc{max-width:var(--sheet-w);margin:0 auto;padding:30px 16px 90px;}\n.sheet{background:var(--paper);position:relative;margin:0 auto 22px;box-shadow:0 18px 50px rgba(0,0,0,.3);overflow:hidden;}\n.sheet.dark{background:var(--ink);color:var(--paper);}\n.sheet-inner{padding:clamp(34px,4.4vw,56px) var(--pad);}\n.sheet.flush .sheet-inner{padding:0;}\n\n.run-head{display:flex;justify-content:space-between;align-items:center;\n  font-family:var(--font-mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase;\n  color:var(--ink-60);padding:15px var(--pad);border-bottom:1px solid var(--bd);}\n.run-head .rh-mark{display:flex;align-items:center;gap:8px;}\n.run-head .rh-mark img{height:12px;}\n.page-no{position:absolute;bottom:16px;right:var(--pad);font-family:var(--font-mono);font-size:10px;letter-spacing:.12em;color:var(--ink-60);}\n\n/* ============================================================ STEP / SECTION HERO (square) */\n.step-hero{background:var(--ink);color:var(--paper);padding:clamp(26px,3.2vw,40px);position:relative;overflow:hidden;margin-bottom:clamp(24px,2.8vw,34px);}\n.step-hero .blueprint{position:absolute;inset:0;pointer-events:none;\n  background-image:linear-gradient(var(--d-soft) 1px,transparent 1px),linear-gradient(90deg,var(--d-soft) 1px,transparent 1px);\n  background-size:40px 40px;mask-image:linear-gradient(160deg,#000,transparent 78%);}\n.step-hero > *{position:relative;z-index:2;}\n.step-badge{display:inline-flex;align-items:center;gap:9px;border:1px solid var(--d-bd);\n  padding:6px 13px 6px 11px;font-family:var(--font-mono);font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--paper);margin-bottom:18px;}\n.step-badge .dot{width:7px;height:7px;border-radius:50%;background:var(--paper);}\n.step-hero h2{font-size:clamp(28px,4vw,46px);letter-spacing:-.03em;color:var(--paper);max-width:20ch;}\n.step-hero .sh-desc{font-size:clamp(14.5px,1.25vw,17px);line-height:1.55;color:var(--d-mute);font-weight:400;max-width:64ch;margin-top:15px;}\n.assign-ref{margin-top:22px;border:1px solid var(--d-bd);padding:15px 18px;background:var(--d-soft);}\n.assign-ref .ar-k{font-family:var(--font-mono);font-size:9.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-50);display:flex;align-items:center;gap:8px;margin-bottom:9px;}\n.assign-ref .ar-k::before{content:\"\";width:14px;height:1px;background:var(--ink-50);}\n.assign-ref p{font-size:13.5px;line-height:1.5;color:var(--d-mute);font-style:italic;}\n.assign-ref p b{font-style:normal;font-weight:600;color:var(--paper);}\n\n.eyebrow{display:flex;align-items:center;gap:12px;margin:clamp(28px,3.2vw,40px) 0 16px;}\n.eyebrow .kicker{white-space:nowrap;}\n.eyebrow .rule{flex:1;height:1px;background:var(--bd);}\n.lead{font-size:clamp(15px,1.2vw,16.5px);line-height:1.6;color:var(--ink-70);max-width:66ch;}\n.lead b{color:var(--ink);font-weight:600;}\n\n/* ============================================================ PILLS / CHIPS */\n.pill{display:inline-flex;align-items:center;gap:7px;border:1px solid var(--bd-2);border-radius:var(--pill);\n  padding:5px 11px;font-size:12px;line-height:1;color:var(--ink-70);background:var(--card);white-space:nowrap;}\n.pill .pd{width:5px;height:5px;border-radius:50%;background:var(--ink);flex:none;}\n.pill-row{display:flex;flex-wrap:wrap;gap:7px;}\n\n.owner-chip{display:inline-flex;align-items:center;gap:8px;border-radius:var(--pill);\n  padding:6px 13px 6px 10px;font-family:var(--font-mono);font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;line-height:1;white-space:nowrap;border:1.5px solid var(--ink);}\n.owner-chip .g{width:9px;height:9px;border-radius:50%;flex:none;}\n.owner-chip.joe{background:var(--ink);color:var(--paper);}\n.owner-chip.joe .g{background:var(--paper);}\n.owner-chip.anais{background:transparent;color:var(--ink);}\n.owner-chip.anais .g{background:transparent;border:1.5px solid var(--ink);}\n.owner-chip.both{background:var(--ink);color:var(--paper);border-style:dashed;}\n.owner-chip.both .g{background:linear-gradient(90deg,var(--paper) 0 50%,transparent 50%);border:1.5px solid var(--paper);}\n.sheet.dark .owner-chip.anais{color:var(--paper);border-color:var(--paper);}\n.sheet.dark .owner-chip.anais .g{border-color:var(--paper);}\n\n.owner-mini{width:11px;height:11px;border-radius:50%;border:1.5px solid var(--ink);flex:none;display:inline-block;}\n.owner-mini.joe{background:var(--ink);}\n\n/* ============================================================ COVER */\n.cover{min-height:760px;display:flex;flex-direction:column;justify-content:space-between;}\n.cover .blueprint{position:absolute;inset:0;background-image:linear-gradient(var(--d-soft) 1px,transparent 1px),linear-gradient(90deg,var(--d-soft) 1px,transparent 1px);background-size:48px 48px;}\n.cover .grain{position:absolute;inset:0;opacity:.4;mix-blend-mode:overlay;}\n.cover-top{position:relative;z-index:2;display:flex;justify-content:space-between;gap:18px;flex-wrap:wrap;padding:clamp(28px,3.4vw,42px) var(--pad) 0;}\n.cover-top .tag{font-family:var(--font-mono);font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-50);}\n.cover-main{position:relative;z-index:2;padding:0 var(--pad);}\n.cover-main .mk{width:clamp(50px,6.2vw,76px);margin-bottom:clamp(24px,3.2vw,38px);}\n.cover-badge{display:inline-flex;align-items:center;gap:9px;border:1px solid var(--d-bd);padding:7px 14px;font-family:var(--font-mono);font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--paper);margin-bottom:22px;}\n.cover-badge .dot{width:7px;height:7px;border-radius:50%;background:var(--paper);}\n.cover-title{font-family:var(--font-display);font-weight:800;font-size:clamp(46px,9vw,102px);line-height:.92;letter-spacing:-.04em;color:var(--paper);}\n.cover-sub{font-size:clamp(15px,1.5vw,18.5px);line-height:1.5;color:var(--d-mute);margin-top:22px;max-width:52ch;font-weight:400;}\n.cover-foot{position:relative;z-index:2;display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:20px;padding:0 var(--pad) clamp(32px,3.4vw,50px);}\n.cover-meta{display:flex;gap:clamp(20px,3.2vw,50px);flex-wrap:wrap;}\n.cover-meta .k{font-family:var(--font-mono);font-size:9.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-50);display:block;margin-bottom:6px;}\n.cover-meta .v{font-family:var(--font-mono);font-size:13px;color:var(--d-mute);letter-spacing:.02em;}\n\n/* ============================================================ OVERVIEW */\n.how-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:1px;background:var(--bd);border:1px solid var(--bd);margin-top:8px;}\n@media(max-width:680px){.how-grid{grid-template-columns:1fr;}}\n.how-cell{background:var(--card);padding:22px 22px;}\n.how-cell .hc-k{font-family:var(--font-mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-50);margin-bottom:10px;}\n.how-cell h4{font-size:20px;letter-spacing:-.01em;margin-bottom:7px;}\n.how-cell p{font-size:13.5px;line-height:1.5;color:var(--ink-70);}\n.steplist{display:flex;flex-direction:column;border:1px solid var(--bd);margin-top:14px;}\n.steplist .sl-row{display:grid;grid-template-columns:74px 1fr;gap:18px;padding:15px 22px;border-bottom:1px solid var(--bd);align-items:baseline;}\n.steplist .sl-row:last-child{border-bottom:none;}\n.steplist .sl-no{font-family:var(--font-mono);font-size:11px;letter-spacing:.08em;color:var(--ink-50);text-transform:uppercase;}\n.steplist .sl-t{font-family:var(--font-display);font-weight:700;font-size:16px;letter-spacing:-.01em;}\n.steplist .sl-t span{font-family:var(--font-text);font-weight:400;font-size:13.5px;color:var(--ink-70);margin-left:8px;letter-spacing:0;}\n\n/* ============================================================ PERSON TOGGLE (in top bar) */\n.person-toggle{display:inline-flex;background:rgba(244,243,239,.05);border:1px solid var(--d-bd);padding:3px;gap:2px;}\n.person-toggle button{font-family:var(--font-mono);font-size:11px;letter-spacing:.08em;text-transform:uppercase;\n  color:var(--d-mute);background:none;border:none;cursor:pointer;padding:8px 16px;transition:.15s;display:inline-flex;align-items:center;gap:8px;}\n.person-toggle button .g{width:9px;height:9px;border-radius:50%;border:1.5px solid currentColor;flex:none;}\n.person-toggle button[data-person=\"joe\"] .g{background:currentColor;}\n.person-toggle button:hover{color:var(--paper);}\n.person-toggle button.active{background:var(--paper);color:var(--ink);}\n.person-toggle button.active .g{border-color:var(--ink);}\n.person-toggle button[data-person=\"joe\"].active .g{background:var(--ink);}\n@media(max-width:560px){.person-toggle button{padding:8px 11px;}.person-toggle button span.lbl-full{display:none;}}\n\n/* folders */\n.folder{display:none;}\n.folder.show{display:block;}\n\n/* ============================================================ FOLDER HEADER */\n.fhead{background:var(--ink);color:var(--paper);position:relative;overflow:hidden;}\n.fhead .blueprint{position:absolute;inset:0;background-image:linear-gradient(var(--d-soft) 1px,transparent 1px),linear-gradient(90deg,var(--d-soft) 1px,transparent 1px);background-size:40px 40px;mask-image:linear-gradient(160deg,#000,transparent 80%);}\n.fhead .fh-in{position:relative;z-index:2;padding:clamp(30px,4vw,48px) var(--pad);}\n.fhead .fh-mk{width:34px;height:auto;margin-bottom:16px;}\n.fhead .fh-tag{font-family:var(--font-mono);font-size:10.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-50);margin-bottom:14px;}\n.fhead .fh-name{font-family:var(--font-display);font-weight:800;font-size:clamp(46px,7vw,86px);line-height:.9;letter-spacing:-.04em;color:var(--paper);}\n.fhead .fh-meta{display:flex;flex-wrap:wrap;gap:10px 26px;margin-top:18px;}\n.fhead .fh-meta .m{font-family:var(--font-mono);font-size:11px;letter-spacing:.04em;color:var(--d-mute);}\n.fhead .fh-meta .m b{color:var(--paper);font-weight:400;}\n\n/* ============================================================ STEP 1 SELF-ASSESS (boxed cards OK rounded) */\n.lens-head{display:flex;align-items:baseline;gap:12px;margin:6px 0 14px;}\n.lens-head h3{font-size:clamp(19px,2.2vw,25px);letter-spacing:-.02em;}\n.lens-head .ln-q{font-family:var(--font-mono);font-size:10.5px;color:var(--ink-50);letter-spacing:.02em;margin-left:auto;text-align:right;max-width:40ch;line-height:1.45;}\n@media(max-width:680px){.lens-head .ln-q{display:none;}}\n.cmp{display:grid;grid-template-columns:1fr 1fr;gap:13px;}\n@media(max-width:680px){.cmp{grid-template-columns:1fr;}}\n.cmp-card{background:var(--card);border:1px solid var(--bd);border-radius:var(--r-card);padding:20px 22px;box-shadow:var(--sh-1);}\n.cmp-card.solo{grid-column:1 / -1;}\n.cmp-card .cc-head{display:flex;align-items:center;gap:10px;padding-bottom:12px;margin-bottom:14px;border-bottom:1px solid var(--bd);}\n.cmp-card .cc-name{font-family:var(--font-display);font-weight:700;font-size:19px;letter-spacing:-.01em;}\n.cmp-block + .cmp-block{margin-top:14px;}\n.cmp-block .cb-q{font-family:var(--font-mono);font-size:9.5px;letter-spacing:.13em;text-transform:uppercase;color:var(--ink-50);margin-bottom:9px;}\n.cmp-block .pill-row .pill{background:var(--card-2);border-color:var(--bd);font-size:12px;padding:5px 11px;}\n.cmp-note{font-size:13.5px;line-height:1.5;color:var(--ink-70);}\n\n.assess-grid{display:grid;grid-template-columns:1fr 1fr;gap:13px;}\n@media(max-width:680px){.assess-grid{grid-template-columns:1fr;}}\n.mini-box{background:var(--card);border:1px solid var(--bd);border-radius:var(--r-card);padding:20px 22px;box-shadow:var(--sh-1);}\n.mini-box .mb-k{font-family:var(--font-mono);font-size:9.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-50);margin-bottom:10px;}\n.mini-box .mb-big{font-family:var(--font-display);font-weight:800;font-size:clamp(26px,3.2vw,38px);letter-spacing:-.03em;line-height:1;}\n.mini-box .mb-sub{font-family:var(--font-mono);font-size:11px;letter-spacing:.05em;color:var(--ink-60);margin-top:7px;text-transform:uppercase;}\n.mini-box p{font-size:13.5px;color:var(--ink-70);line-height:1.5;margin-top:12px;padding-top:12px;border-top:1px solid var(--bd);}\n.mini-box.plain p{margin-top:0;padding-top:0;border-top:none;}\n\n/* ============================================================ CATEGORY MAP (summary) */\n.cat-list{display:grid;grid-template-columns:1fr 1fr;gap:13px;}\n@media(max-width:760px){.cat-list{grid-template-columns:1fr;}}\n.cat-card{background:var(--card);border:1px solid var(--bd);border-radius:var(--r-card);padding:22px;box-shadow:var(--sh-1);display:flex;flex-direction:column;gap:13px;}\n.cat-card .ct-top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;}\n.cat-card .ct-no{font-family:var(--font-mono);font-size:11px;color:var(--ink-50);}\n.cat-card .ct-name{font-family:var(--font-display);font-weight:800;font-size:clamp(20px,2.2vw,26px);letter-spacing:-.02em;margin-top:4px;}\n.cat-card .ct-includes{font-family:var(--font-mono);font-size:10px;letter-spacing:.04em;text-transform:uppercase;color:var(--ink-60);margin-top:5px;line-height:1.5;}\n.cat-card .ct-resp{font-size:13.5px;line-height:1.5;color:var(--ink-70);}\n.cat-card .ct-resp b{color:var(--ink);font-weight:600;}\n\n.split-hero{display:grid;grid-template-columns:1fr 1fr;gap:13px;margin-bottom:24px;}\n@media(max-width:680px){.split-hero{grid-template-columns:1fr;}}\n.split-card{border-radius:var(--r-card);padding:24px;border:1px solid var(--bd);background:var(--card);box-shadow:var(--sh-1);}\n.split-card .sc-top{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:6px;}\n.split-card .sc-name{font-family:var(--font-display);font-weight:800;font-size:clamp(26px,3vw,36px);letter-spacing:-.02em;}\n.split-card .sc-role{font-family:var(--font-mono);font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-60);}\n.split-card .sc-cats{display:flex;flex-wrap:wrap;gap:8px;margin-top:16px;}\n\n/* ============================================================ STEP 3 TASK CARDS */\n.cat-group{margin-bottom:20px;}\n.cat-group-head{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;\n  background:var(--ink);color:var(--paper);padding:13px 20px;}\n.cat-group-head .cg-l{display:flex;align-items:baseline;gap:12px;}\n.cat-group-head .cg-no{font-family:var(--font-mono);font-size:11px;color:var(--ink-50);}\n.cat-group-head .cg-name{font-family:var(--font-display);font-weight:800;font-size:clamp(18px,2vw,23px);letter-spacing:-.02em;color:var(--paper);}\n.cat-group-head .cg-own{font-family:var(--font-mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--d-mute);}\n.cat-group-head .cg-count{font-family:var(--font-mono);font-size:10px;letter-spacing:.1em;text-transfo rtant;}\n  body.jdprint .jd-block.show{display:block!important;}\n}\n\n/* ============================================================ STEP 5 MEETING */\n.mtg-facts{display:grid;grid-template-columns:repeat(4,1fr);gap:11px;margin-bottom:14px;}\n@media(max-width:680px){.mtg-facts{grid-template-columns:1fr 1fr;}}\n.mtg-fact{border:1px solid var(--d-bd);padding:16px;background:var(--d-soft);}\n.mtg-fact .mf-k{font-family:var(--font-mono);font-size:9.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-50);margin-bottom:8px;}\n.mtg-fact .mf-v{font-family:var(--font-display);font-weight:700;font-size:clamp(16px,1.7vw,20px);letter-spacing:-.01em;color:var(--paper);line-height:1.1;}\n.mtg-fact .mf-s{font-size:12px;color:var(--d-mute);margin-top:5px;}\n.agenda{display:flex;flex-direction:column;gap:9px;margin-top:6px;}\n.ag-item{display:grid;grid-template-columns:30px 1fr auto;gap:16px;align-items:start;border:1px solid var(--d-bd);padding:16px 18px;background:var(--d-soft);}\n.ag-item .ag-no{font-family:var(--font-mono);font-size:11px;color:var(--ink-50);padding-top:3px;}\n.ag-item .ag-t{font-family:var(--font-display);font-weight:700;font-size:clamp(16px,1.7vw,19px);letter-spacing:-.01em;color:var(--paper);}\n.ag-item .ag-pts{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px;}\n.ag-item .ag-pts .pill{background:var(--d-soft);border-color:var(--d-bd);color:var(--d-mute);font-size:11.5px;padding:5px 10px;}\n.ag-item .ag-pts .pill .pd{background:var(--paper);}\n.ag-item .ag-time{font-family:var(--font-mono);font-size:12px;color:var(--paper);letter-spacing:.02em;border:1px solid var(--d-bd);padding:5px 11px;white-space:nowrap;}\n@media(max-width:680px){.ag-item{grid-template-columns:26px 1fr;}.ag-item .ag-time{grid-column:2;justify-self:start;margin-top:8px;}}\n\n/* ============================================================ CADENCE FILTER BAR */\n.filterbar{position:sticky;top:47px;z-index:25;background:rgba(244,243,239,.94);backdrop-filter:blur(12px);\n  border-bottom:1px solid var(--bd-2);padding:12px var(--pad);display:flex;flex-wrap:wrap;gap:10px;align-items:center;}\n.filterbar .fg-label{font-family:var(--font-mono);font-size:9.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-50);margin-right:4px;}\n.chip{font-family:var(--font-mono);font-size:11px;letter-spacing:.06em;text-transform:uppercase;\n  padding:7px 13px;border:1px solid var(--bd-2);border-radius:var(--pill);background:var(--card);color:var(--ink-70);cursor:pointer;transition:.15s;line-height:1;}\n.chip:hover{border-color:var(--ink);color:var(--ink);}\n.chip.active{background:var(--ink);color:var(--paper);border-color:var(--ink);}\n\n/* ============================================================ SIGN-OFF */\n.signoff{display:flex;flex-direction:column;gap:30px;}\n.sign-row{display:flex;gap:clamp(24px,5vw,64px);flex-wrap:wrap;}\n.sign{flex:1;min-width:200px;}\n.sign .sg-line{height:1.5px;background:var(--bd-2);margin-bottom:11px;}\n.sign .sg-name{font-family:var(--font-display);font-weight:800;font-size:20px;letter-spacing:-.01em;}\n.sign .sg-role{font-family:var(--font-mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-60);margin-top:5px;}\n\n/* ============================================================ TOP BAR */\n.topbar{position:sticky;top:0;z-index:60;display:flex;align-items:center;justify-content:space-between;gap:16px;\n  background:var(--ink);color:var(--paper);padding:11px clamp(16px,3vw,28px);}\n.topbar .tb-brand{display:flex;align-items:center;gap:11px;}\n.topbar .tb-brand img{height:15px;}\n.topbar .tb-brand span{font-family:var(--font-mono);font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--d-mute);}\n.topbar nav{display:flex;gap:1px;flex-wrap:wrap;}\n.topbar nav a{font-family:var(--font-mono);font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-50);padding:7px 9px;transition:.15s;cursor:pointer;}\n.topbar nav a:hover{color:var(--paper);}\n.topbar .tb-print{font-family:var(--font-mono);font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;\n  border:1px solid var(--paper);color:var(--paper);background:none;padding:8px 15px;cursor:pointer;transition:.15s;white-space:nowrap;}\n.topbar .tb-print:hover{background:var(--paper);color:var(--ink);}\n@media(max-width:920px){.topbar nav{display:none;}}\n\n.reveal{opacity:0;transform:translateY(14px);transition:opacity .55s cubic-bezier(.2,.7,.2,1),transform .55s cubic-bezier(.2,.7,.2,1);}\n.reveal.in{opacity:1;transform:none;}\n@media(prefers-reduced-motion:reduce){.reveal{opacity:1;transform:none;transition:none;}}\n\n/* ============================================================ PRINT */\n@page{size:A4 portrait;margin:0;}\n@media print{\n  body{background:#fff;}\n  .topbar,.filterbar,.toggle-wrap{display:none !important;}\n  .doc{max-width:none;margin:0;padding:0;}\n  .sheet{box-shadow:none;margin:0;page-break-after:always;break-after:page;}\n  .sheet:last-child{page-break-after:auto;}\n  .folder{display:block !important;}\n  .taskcard.dim{display:grid !important;}\n  .reveal{opacity:1 !important;transform:none !important;}\n  *{box-shadow:none !important;-webkit-print-color-adjust:exact;print-color-adjust:exact;}\n}\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n<header class=\"topbar\">\n  <a class=\"tb-brand\" href=\"#cover\">\n    <img src=\"03987ec8-160e-418f-a7b6-083b8c7537b3\" alt=\"CrossFit Woolwich\">\n    <span>Ownership Roles<\u002Fspan>\n  <\u002Fa>\n  <div class=\"person-toggle\" role=\"tablist\" aria-label=\"Whose folder to view\">\n    <button type=\"button\" data-person=\"joe\"><span class=\"g\"><\u002Fspan>Joe<\u002Fbutton>\n    <button type=\"button\" data-person=\"anais\"><span class=\"g\"><\u002Fspan>Anais<\u002Fbutton>\n    <button type=\"button\" data-person=\"roles\"><span class=\"g\"><\u002Fspan><span class=\"lbl-full\">On Paper<\u002Fspan><\u002Fbutton>\n    <button type=\"button\" data-person=\"summary\"><span class=\"g\"><\u002Fspan><span class=\"lbl-full\">Summary<\u002Fspan><\u002Fbutton>\n  <\u002Fdiv>\n  <button class=\"tb-print\" type=\"button\" data-print=\"\">↓ PDF<\u002Fbutton>\n<\u002Fheader>\n\n<div class=\"doc\">\n\n  <!-- ================= COVER ================= -->\n  <section class=\"sheet dark flush cover\" id=\"cover\" data-screen-label=\"Cover\">\n    <div class=\"blueprint\"><\u002Fdiv>\n    <svg class=\"grain\" xmlns=\"http://www.w3.org/2000/svg\"><filter id=\"grx\"><feTurbulence type=\"fractalNoise\" baseFrequency=\"0.9\" numOctaves=\"2\" stitchTiles=\"stitch\"><\u002FfeTurbulence><feColorMatrix type=\"saturate\" values=\"0\"><\u002FfeColorMatrix><\u002Ffilter><rect width=\"100%\" height=\"100%\" filter=\"url(#grx)\"><\u002Frect><\u002Fsvg>\n    <div class=\"cover-top\">\n      <span class=\"tag\">CrossFit Woolwich<\u002Fspan>\n      <span class=\"tag\">Best Hour of Their Day · Affiliate University<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"cover-main\">\n      <img class=\"mk\" src=\"03987ec8-160e-418f-a7b6-083b8c7537b3\" alt=\"W\">\n      <span class=\"cover-badge\"><span class=\"dot\"><\u002Fspan>Assignment 01 · Completed<\u002Fspan>\n      <h1 class=\"cover-title\">Defining<br>Ownership Roles<\u002Fh1>\n      <p class=\"cover-sub\">Our completed homework, who owns what at CrossFit Woolwich, broken down task by task. Use the toggle up top to flick between Joe, Anais and the summary. Written up by Joe &amp; Anais.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"cover-foot\">\n      <div class=\"cover-meta\">\n        <div class=\"item\"><span class=\"k\">Owners<\u002Fspan><span class=\"v\">Joe &amp; Anais<\u002Fspan><\u002Fdiv>\n        <div class=\"item\"><span class=\"k\">Submitted<\u002Fspan><span class=\"v\">June 2026<\u002Fspan><\u002Fdiv>\n        <div class=\"item\"><span class=\"k\">Covers<\u002Fspan><span class=\"v\">Steps 1 – 5<\u002Fspan><\u002Fdiv>\n        <div class=\"item\"><span class=\"k\">Box<\u002Fspan><span class=\"v\">Royal Arsenal · SE18<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ================= OVERVIEW ================= -->\n  <section class=\"sheet flush\" id=\"overview\" data-screen-label=\"Overview\">\n    <div class=\"run-head\">\n      <span class=\"rh-mark\"><img src=\"285b29ad-dd22-4413-94b4-80508f3d8077\" alt=\"\">CrossFit Woolwich<\u002Fspan>\n      <span>How to read this<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"sheet-inner\">\n      <span class=\"kicker reveal\">The assignment<\u002Fspan>\n      <h2 class=\"reveal\" style=\"font-size:clamp(27px,3.6vw,44px);letter-spacing:-.03em;margin-top:12px;max-width:22ch;\">Built as two folders, plus a summary<\u002Fh2>\n      <p class=\"lead reveal\" style=\"margin-top:16px;\">The exercise asks us to clearly define who is responsible for what, so the business stops running on overlap. Rather than wade through it all at once, we've split everything into a folder each, flick between them with the toggle at the top. Each folder holds that person's self-assessment, the categories they own, and every specific task they're accountable for. The summary ties it together and sets the weekly meeting.<\u002Fp>\n\n      <div class=\"how-grid reveal\">\n        <div class=\"how-cell\"><div class=\"hc-k\">Folder 01<\u002Fdiv><h4>Joe<\u002Fh4><p>Full-time owner-operator. His self-assessment, owned categories and full task list.<\u002Fp><\u002Fdiv>\n        <div class=\"how-cell\"><div class=\"hc-k\">Folder 02<\u002Fdiv><h4>Anais<\u002Fh4><p>Part-time owner around a full-time HR career. Her self-assessment, categories and tasks.<\u002Fp><\u002Fdiv>\n        <div class=\"how-cell\"><div class=\"hc-k\">Folder 03<\u002Fdiv><h4>Summary<\u002Fh4><p>The full ownership map, how the split works, and the weekly owner meeting.<\u002Fp><\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"eyebrow reveal\"><span class=\"kicker\">It follows the five steps<\u002Fspan><span class=\"rule\"><\u002Fspan><\u002Fdiv>\n      <div class=\"steplist reveal\">\n        <div class=\"sl-row\"><span class=\"sl-no\">Step 1<\u002Fspan><span class=\"sl-t\">The alignment meeting<span>, our honest self-assessment (in each folder)<\u002Fspan><\u002Fspan><\u002Fdiv>\n        <div class=\"sl-row\"><span class=\"sl-no\">Step 2<\u002Fspan><span class=\"sl-t\">Assign ownership categories<span>, six areas, one owner each (summary)<\u002Fspan><\u002Fspan><\u002Fdiv>\n        <div class=\"sl-row\"><span class=\"sl-no\">Step 3<\u002Fspan><span class=\"sl-t\">Assign specific tasks<span>, every task with an owner, cadence &amp; outcome (in each folder)<\u002Fspan><\u002Fspan><\u002Fdiv>\n        <div class=\"sl-row\"><span class=\"sl-no\">Step 4<\u002Fspan><span class=\"sl-t\">Document it<span>, a role sheet for each of us (in each folder)<\u002Fspan><\u002Fspan><\u002Fdiv>\n        <div class=\"sl-row\"><span class=\"sl-no\">Step 5<\u002Fspan><span class=\"sl-t\">Weekly owner meeting<span>, day, time, place &amp; agenda (summary)<\u002Fspan><\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <span class=\"page-no\">01<\u002Fspan>\n  <\u002Fsection>\n\n  <!-- (top cadence filter removed; each Step 3 view has its own controls) -->\n\n  <!-- ============================================================ -->\n  <!-- JOE FOLDER -->\n  <!-- ============================================================ -->\n  <div class=\"folder\" data-person=\"joe\">\n\n    <!-- header + Step 1 -->\n    <section class=\"sheet flush\" data-screen-label=\"Joe, Self-assessment\">\n      <div class=\"fhead\">\n        <div class=\"blueprint\"><\u002Fdiv>\n        <div class=\"fh-in\">\n          <img class=\"fh-mk\" src=\"03987ec8-160e-418f-a7b6-083b8c7537b3\" alt=\"\">\n          <div class=\"fh-tag\">Owner folder 01<\u002Fdiv>\n          <div class=\"fh-name\">Joe<\u002Fdiv>\n          <div class=\"fh-meta\"><span class=\"m\">Role <b>Owner-operator<\u002Fb><\u002Fspan><span class=\"m\">Time <b>Full-time · 50–60 hrs/wk<\u002Fb><\u002Fspan><span class=\"m\">Owns <b>Sales · Service · Facility<\u002Fb><\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"sheet-inner\">\n        <div class=\"lens-head\"><h3>Step 1 · My self-assessment<\u002Fh3><span class=\"ln-q\">From our alignment meeting<\u002Fspan><\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:13px;\">\n          <div class=\"cmp-card solo\">\n            <div class=\"cc-head\"><span class=\"owner-mini joe\"><\u002Fspan><span class=\"cc-name\">Strengths<\u002Fspan><\u002Fdiv>\n            <div class=\"cmp-block\"><div class=\"cb-q\">Naturally good at<\u002Fdiv><div class=\"pill-row\"><span class=\"pill\"><span class=\"pd\"><\u002Fspan>Big-picture thinking<\u002Fspan><span class=\"pill\"><span class=\"pd\"><\u002Fspan>Research &amp; development<\u002Fspan><span class=\"pill\"><span class=\"pd\"><\u002Fspan>Planning<\u002Fspan><span class=\"pill\"><span class=\"pd\"><\u002Fspan>Creative &amp; consulting<\u002Fspan><\u002Fdiv><\u002Fdiv>\n            <div class=\"cmp-block\"><div class=\"cb-q\">Energised by<\u002Fdiv><div class=\"pill-row\"><span class=\"pill\"><span class=\"pd\"><\u002Fspan>Strategy planning<\u002Fspan><span class=\"pill\"><span class=\"pd\"><\u002Fspan>Software &amp; systems<\u002Fspan><span class=\"pill\"><span class=\"pd\"><\u002Fspan>Coaching<\u002Fspan><span class=\"pill\"><span class=\"pd\"><\u002Fspan>Design across the business<\u002Fspan><\u002Fdiv><\u002Fdiv>\n            <div class=\"cmp-block\"><div class=\"cb-q\">Confident leading<\u002Fdiv><div class=\"pill-row\"><span class=\"pill\"><span class=\"pd\"><\u002Fspan>Sales<\u002Fspan><span class=\"pill\"><span class=\"pd\"><\u002Fspan>Brand development &amp; direction<\u002Fspan><span class=\"pill\"><span class=\"pd\"><\u002Fspan>Team standards &amp; expectations<\u002Fspan><\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"cmp-card solo\">\n            <div class=\"cc-head\"><span class=\"owner-mini joe\"><\u002Fspan><span class=\"cc-name\">Weaknesses &amp; don't-wants<\u002Fspan><\u002Fdiv>\n            <div class=\"cmp-block\"><div class=\"cb-q\">Drains me<\u002Fdiv><div class=\"pill-row\"><span class=\"pill\"><span class=\"pd\"><\u002Fspan>Mundane, repetitive tasks<\u002Fspan><span class=\"pill\"><span class=\"pd\"><\u002Fspan>People management<\u002Fspan><\u002Fdiv><\u002Fdiv>\n            <div class=\"cmp-block\"><div class=\"cb-q\">I avoid<\u002Fdiv><div class=\"pill-row\"><span class=\"pill\"><span class=\"pd\"><\u002Fspan>Confrontation &amp; hard conversations<\u002Fspan><span class=\"pill\"><span class=\"pd\"><\u002Fspan>Anything finance<\u002Fspan><\u002Fdiv><\u002Fdiv>\n            <div class=\"cmp-block\"><div class=\"cb-q\">Don't want long term<\u002Fdiv><div class=\"pill-row\"><span class=\"pill\"><span class=\"pd\"><\u002Fspan>Day-to-day admin<\u002Fspan><span class=\"pill\"><span class=\"pd\"><\u002Fspan>Day-to-day facility management<\u002Fspan><span class=\"pill\"><span class=\"pd\"><\u002Fspan>Finances &amp; budgeting<\u002Fspan><\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"assess-grid\">\n            <div class=\"mini-box\"><div class=\"mb-k\">Time availability<\u002Fdiv><div class=\"mb-big\">Full-time<\u002Fdiv><div class=\"mb-sub\">50–60 hrs / week · in the box daily<\u002Fdiv><p>Wants to stay present and hands-on, but by choice. Free to coach, consult and work on the business, rather than be tied to evening classes and daily operations.<\u002Fp><\u002Fdiv>\n            <div class=\"mini-box\"><div class=\"mb-k\">Long-term goal<\u002Fdiv><p class=\"plain\" style=\"margin-top:0;border-top:none;padding-top:0;font-size:14.5px;color:var(--ink-85);\">To be in the gym because I choose to be, coaching, consulting and driving the big projects, while the day-to-day runs without needing me in it. Long term, more time working on the business: strategy, growth and the product.<\u002Fp><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <span class=\"page-no\">J · 1<\u002Fspan>\n    <\u002Fsection>\n\n    <!-- Step 3 tasks -->\n    <section class=\"sheet flush\" data-screen-label=\"Joe, Tasks\">\n      <div class=\"run-head\"><span class=\"rh-mark\"><img src=\"285b29ad-dd22-4413-94b4-80508f3d8077\" alt=\"\">Joe<\u002Fspan><span>Step 3 · My specific tasks<\u002Fspan><\u002Fdiv>\n      <div class=\"sheet-inner\">\n        <div class=\"lens-head\"><h3>Step 3 · The tasks I own<\u002Fh3><span class=\"ln-q\">Grid, Kanban or one by one<\u002Fspan><\u002Fdiv>\n        <p class=\"lead reveal\" style=\"font-size:13.5px;color:var(--ink-70);margin-bottom:18px;\">Every task I'm responsible for, with its cadence and a measurable outcome. Some sit inside categories Anais owns, that's deliberate; the category owner makes sure it happens, but the task is mine to execute.<\u002Fp>\n        <div class=\"rhythm-wrap reveal\">\n          <div class=\"rhythm-head\"><h4>The rhythm of my month<\u002Fh4><span class=\"rhh-s\">How often, not just what<\u002Fspan><\u002Fdiv>\n          <div class=\"rhythm\" id=\"joe-rhythm\"><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"tv-wrap reveal\" data-person=\"joe\">\n          <div class=\"tasks-detail-label\" style=\"margin-bottom:14px;\">Task by task<\u002Fdiv>\n          <div class=\"tv-bar\">\n            <div class=\"grp\"><span class=\"lab\">View<\u002Fspan><div class=\"seg tv-mode\"><button data-m=\"grid\" class=\"active\">Grid<\u002Fbutton><button data-m=\"kanban\">Kanban<\u002Fbutton><button data-m=\"task\">Task by task<\u002Fbutton><\u002Fdiv><\u002Fdiv>\n            <div class=\"grp\"><span class=\"lab\">Cadence<\u002Fspan><span class=\"tvchip active\" data-c=\"all\">All<\u002Fspan><span class=\"tvchip\" data-c=\"daily\">Daily<\u002Fspan><span class=\"tvchip\" data-c=\"weekly\">Weekly<\u002Fspan><span class=\"tvchip\" data-c=\"monthly\">Monthly<\u002Fspan><span class=\"tvchip\" data-c=\"adhoc\">Ad hoc<\u002Fspan><\u002Fdiv>\n          <\ e=\"\">↓ Download this role (PDF)<\u002Fbutton>\n        <\u002Fdiv>\n\n        <div class=\"jd-block\" data-jd=\"joe\">\n          <div class=\"jd2\">\n            <div class=\"jd2-side\">\n              <div class=\"nm\">Joe<\u002Fdiv>\n              <div class=\"ti\">Co-Owner · Sales, Service &amp; Facility<\u002Fdiv>\n              <div class=\"jd2-f first\"><div class=\"k\">Commitment<\u002Fdiv><div class=\"v\">Full-time<\u002Fdiv><\u002Fdiv>\n              <div class=\"jd2-f\"><div class=\"k\">Hours<\u002Fdiv><div class=\"v\">50–60 hrs / week, in the box daily<\u002Fdiv><\u002Fdiv>\n              <div class=\"jd2-f\"><div class=\"k\">Accountable to<\u002Fdiv><div class=\"v\">Joint ownership with Anais<\u002Fdiv><\u002Fdiv>\n              <div class=\"jd2-f\"><div class=\"k\">Strengths<\u002Fdiv><div class=\"jd2-chips\"><span class=\"jd2-chip\">Big-picture strategy<\u002Fspan><span class=\"jd2-chip\">Sales &amp; brand<\u002Fspan><span class=\"jd2-chip\">Coaching<\u002Fspan><span class=\"jd2-chip\">Facility design &amp; R&amp;D<\u002Fspan><\u002Fdiv><\u002Fdiv>\n            <\u002Fdiv>\n            <div class=\"jd2-main\">\n              <div class=\"jd-seclab\">Role purpose<\u002Fdiv>\n              <p class=\"jd-purpose\">Joe owns the front of the business and the floor: bringing new members in, holding the standard of coaching and the member experience, and keeping the space safe, sharp and on-brand. He works on the business as much as in it, leading strategy, growth and the product.<\u002Fp>\n              <div class=\"jd-seclab\">Key responsibilities<\u002Fdiv>\n              <div class=\"jd-area\"><div class=\"jd-areah\">Sales<\u002Fdiv><ul class=\"jd-bul\"><li>Own the end-to-end sales process, from first enquiry to signed member<\u002Fli><li>First point of contact for new leads; runs consultations and trials<\u002Fli><li>Sets and maintains pricing and membership offers (numbers agreed with Anais)<\u002Fli><li>Accountable for conversion rates and new-member growth<\u002Fli><\u002Ful><\u002Fdiv>\n              <div class=\"jd-area\"><div class=\"jd-areah\">Service · Coach Development<\u002Fdiv><ul class=\"jd-bul\"><li>Sets and upholds coaching standards across every class<\u002Fli><li>Leads coach development and the CPD framework<\u002Fli><li>Owns programming direction and curriculum<\u002Fli><li>Safeguards the on-floor member experience<\u002Fli><\u002Ful><\u002Fdiv>\n              <div class=\"jd-area\"><div class=\"jd-areah\">Facility<\u002Fdiv><ul class=\"jd-bul\"><li>Owns the design, layout and optimisation of the space<\u002Fli><li>Oversees equipment, maintenance, safety and cleanliness<\u002Fli><li>Ensures the facility reflects the brand at all times<\u002Fli><\u002Ful><\u002Fdiv>\n              <div class=\"jd-seclab mt\">Decision authority<\u002Fdiv>\n              <ul class=\"jd-bul\"><li>Pricing and membership offers<\u002Fli><li>Programming and curriculum direction<\u002Fli><li>Facility projects and layout<\u002Fli><li>Senior hires and coach development<\u002Fli><\u002Ful>\n              <div class=\"bw\"><div class=\"bw-head\"><span class=\"k\">Brings to the weekly meeting<\u002Fspan><span class=\"meta\">Sat · 12:30 · off-site<\u002Fspan><\u002Fdiv><div class=\"bw-row\"><span class=\"no\">01<\u002Fspan><span class=\"a\">Sales<\u002Fspan><span class=\"bw-r\"><span class=\"t\">Sales numbers &amp; conversion<\u002Fspan><span class=\"s\">Leads in, consults and trials, and where conversion is landing.<\u002Fspan><\u002Fspan><\u002Fdiv><div class=\"bw-row\"><span class=\"no\">02<\u002Fspan><span class=\"a\">Service<\u002Fspan><span class=\"bw-r\"><span class=\"t\">Coaching &amp; class quality<\u002Fspan><span class=\"s\">Standards on the floor, coach development and anything to flag.<\u002Fspan><\u002Fspan><\u002Fdiv><div class=\"bw-row\"><span class=\"no\">03<\u002Fspan><span class=\"a\">Facility<\u002Fspan><span class=\"bw-r\"><span class=\"t\">Facility status &amp; needs<\u002Fspan><span class=\"s\">Repairs, projects and anything blocking the space.<\u002Fspan><\u002Fspan><\u002Fdiv><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"jd-block\" data-jd=\"anais\">\n          <div class=\"jd2\">\n            <div class=\"jd2-side\">\n              <div class=\"nm\">Anais<\u002Fdiv>\n              <div class=\"ti\">Co-Owner · Marketing, Retention &amp; Admin<\u002Fdiv>\n              <div class=\"jd2-f first\"><div class=\"k\">Commitment<\u002Fdiv><div class=\"v\">Part-time<\u002Fdiv><\u002Fdiv>\n              <div class=\"jd2-f\"><div class=\"k\">Hours<\u002Fdiv><div class=\"v\">Part-time, around a full-time HR career<\u002Fdiv><\u002Fdiv>\n              <div class=\"jd2-f\"><div class=\"k\">Accountable to<\u002Fdiv><div class=\"v\">Joint ownership with Joe<\u002Fdiv><\u002Fdiv>\n              <div class=\"jd2-f\"><div class=\"k\">Strengths<\u002Fdiv><div class=\"jd2-chips\"><span class=\"jd2-chip\">People &amp; culture<\u002Fspan><span class=\"jd2-chip\">Finance &amp; reporting<\u002Fspan><span class=\"jd2-chip\">Events &amp; community<\u002Fspan><span class=\"jd2-chip\">Systems &amp; HR<\u002Fspan><\u002Fdiv><\u002Fdiv>\n            <\u002Fdiv>\n            <div class=\"jd2-main\">\n              <div class=\"jd-seclab\">Role purpose<\u002Fdiv>\n              <p class=\"jd-purpose\">Anais owns how the gym is seen, why members stay, and the back office that keeps it all running. She leads marketing and community, protects the member experience and culture, and holds the finances, HR and systems of the business.<\u002Fp>\n              <div class=\"jd-seclab\">Key responsibilities<\u002Fdiv>\n              <div class=\"jd-area\"><div class=\"jd-areah\">Marketing<\u002Fdiv><ul class=\"jd-bul\"><li>Owns the marketing funnel, content and member communications<\u002Fli><li>Plans and delivers campaigns around intakes, events and challenges<\u002Fli><li>Upholds brand consistency across every channel<\u002Fli><li>Reports on reach, engagement and enquiries<\u002Fli><\u002Ful><\u002Fdiv>\n              <div class=\"jd-area\"><div class=\"jd-areah\">Retention · Events &amp; Community<\u002Fdiv><ul class=\"jd-bul\"><li>Owns the member journey and works to reduce churn<\u002Fli><li>Tracks and re-engages at-risk members<\u002Fli><li>Plans and runs community events and member recognition<\u002Fli><li>Builds culture and team morale<\u002Fli><\u002Ful><\u002Fdiv>\n              <div class=\"jd-area\"><div class=\"jd-areah\">Admin · Finances &amp; HR<\u002Fdiv><ul class=\"jd-bul\"><li>Owns budgeting, payroll, reporting and bookkeeping oversight<\u002Fli><li>Leads HR: contracts, onboarding, policy and people processes<\u002Fli><li>Keeps systems, scheduling and memberships accurate<\u002Fli><li>Maintains clean financials and a clear scoreboard<\u002Fli><\u002Ful><\u002Fdiv>\n              <div class=\"jd-seclab mt\">Decision authority<\u002Fdiv>\n              <ul class=\"jd-bul\"><li>Content and campaign calendar<\u002Fli><li>Events and retention initiatives<\u002Fli><li>Budgeting and HR processes<\u002Fli><li>Software and systems<\u002Fli><\u002Ful>\n              <div class=\"bw\"><div class=\"bw-head\"><span class=\"k\">Brings to the weekly meeting<\u002Fspan><span class=\"meta\">Sat · 12:30 · off-site<\u002Fspan><\u002Fdiv><div class=\"bw-row\"><span class=\"no\">01<\u002Fspan><span class=\"a\">Marketing<\u002Fspan><span class=\"bw-r\"><span class=\"t\">Marketing &amp; funnel update<\u002Fspan><span class=\"s\">Reach, campaigns and the enquiries coming through.<\u002Fspan><\u002Fspan><\u002Fdiv><div class=\"bw-row\"><span class=\"no\">02<\u002Fspan><span class=\"a\">Retention<\u002Fspan><span class=\"bw-r\"><span class=\"t\">Retention, churn &amp; events<\u002Fspan><span class=\"s\">At-risk members, community events and milestones.<\u002Fspan><\u002Fspan><\u002Fdiv><div class=\"bw-row\"><span class=\"no\">03<\u002Fspan><span class=\"a\">Admin<\u002Fspan><span class=\"bw-r\"><span class=\"t\">Scoreboard, finances &amp; KPIs<\u002Fspan><span class=\"s\">The numbers, budget vs actuals and any people admin.<\u002Fspan><\u002Fspan><\u002Fdiv><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <span class=\"page-no\">R<\u002Fspan>\n    <\u002Fsection>\n  <\u002Fdiv>\n\n  <!-- ============================================================ -->\n  <!-- SUMMARY FOLDER -->\n  <!-- ============================================================ -->\n  <div class=\"folder\" data-person=\"summary\">\n\n    <!-- Step 2 categories -->\n    <section class=\"sheet flush\" data-screen-label=\"Summary, Ownership Map\">\n      <div class=\"run-head\"><span class=\"rh-mark\"><img src=\"285b29ad-dd22-4413-94b4-80508f3d8077\" alt=\"\">CrossFit Woolwich<\u002Fspan><span>Summary · Ownership Map<\u002Fspan><\u002Fdiv>\n      <div class=\"sheet-inner\">\n        <div class=\"step-hero reveal\">\n          <div class=\"blueprint\"><\u002Fdiv>\n          <span class=\"step-badge\"><span class=\"dot\"><\u002Fspan>Step 02 · Assign Ownership Categories<\u002Fspan>\n          <h2>Six areas. Two owners. One business.<\u002Fh2>\n          <p class=\"sh-desc\">Each of the six main categories has a single, clear owner. Owning a category doesn't mean doing every task in it, it means being the person responsible for making sure it gets done, tracked, reported and held accountable. The task-level detail lives in each owner's folder.<\u002Fp>\n          <div class=\"assign-ref\">\n            <div class=\"ar-k\">From the assignment<\u002Fdiv>\n            <p>Every major category should have <b>one clear owner<\u002Fb> who is responsible for ensuring it gets done, tracking progress, reporting updates, managing the systems and creating accountability.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"split-hero reveal\">\n          <div class=\"split-card\">\n            <div class=\"sc-top\"><span class=\"sc-name\">Joe<\u002Fspan><span class=\"owner-chip joe\"><span class=\"g\"><\u002Fspan>Full-time<\u002Fspan><\u002Fdiv>\n            <div class=\"sc-role\">Owns 3 of 6 categories<\u002Fdiv>\n            <div class=\"sc-cats\"><span class=\"pill\"><span class=\"pd\"><\u002Fspan>Sales<\u002Fspan><span class=\"pill\"><span class=\"pd\"><\u002Fspan>Service<\u002Fspan><span class=\"pill\"><span class=\"pd\"><\u002Fspan>Facility<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"split-card\">\n            <div class=\"sc-top\"><span class=\"sc-name\">Anais<\u002Fspan><span class=\"owner-chip anais\"><span class=\"g\"><\u002Fspan>Part-time<\u002Fspan><\u002Fdiv>\n            <div class=\"sc-role\">Owns 3 of 6 categories<\u002Fdiv>\n            <div class=\"sc-cats\"><span class=\"pill\"><span class=\"pd\"><\u002Fspan>Marketing<\u002Fspan><span class=\"pill\"><span class=\"pd\"><\u002Fspan>Retention<\u002Fspan><span class=\"pill\"><span class=\"pd\"><\u002Fspan>Admin<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"cat-list reveal\">\n          <div class=\"cat-card\"><div class=\"ct-top\"><div><span class=\"ct-no\">01<\u002Fspan><div class=\"ct-name\">Sales<\u002Fdiv><div class=\"ct-includes\">Leads · consults · trials · sales tracking · nurture<\u002Fdiv><\u002Fdiv><span class=\"owner-chip joe\"><span class=\"g\"><\u002Fspan>Joe<\u002Fspan><\u002Fdiv><p class=\"ct-resp\"><b>Accountable for<\u002Fb> tracking lead numbers, improving conversion, fast follow-up and managing the whole sales process.<\u002Fp><\u002Fdiv>\n          <div class=\"cat-card\"><div class=\"ct-top\"><div><span class=\"ct-no\">02<\u002Fspan><div class=\"ct-name\">Marketing<\u002Fdiv><div class=\"ct-includes\">Social · member comms · website · events · brand<\u002Fdiv><\u002Fdiv><span class=\"owner-chip anais\"><span class=\"g\"><\u002Fspan>Anais<\u002Fspan><\u002Fdiv><p class=\"ct-resp\"><b>Accountable for<\u002Fb> consistent communication, brand consistency, promoting events and keeping members informed.<\u002Fp><\u002Fdiv>\n          <div class=\"cat-card\"><div class=\"ct-top\"><div><span class=\"ct-no\">03<\u002Fspan><div class=\"ct-name\">Retention<\u002Fdiv><div class=\"ct-includes\">Member journey · milestones · at-risk · referrals · community<\u002Fdiv><\u002Fdiv><span class=\"owner-chip anais\"><span class=\"g\"><\u002Fspan>Anais<\u002Fspan><\u002Fdiv><p class=\"ct-resp\"><b>Accountable for<\u002Fb> member experience, reducing churn, tracking at-risk members and building retention systems.<\u002Fp><\u002Fdiv>\n          <div class=\"cat-card\"><div class=\"ct-top\"><div><span class=\"ct-no\">04<\u002Fspan><div class=\"ct-name\">Service<\u002Fdiv><div class=\"ct-includes\">Coach development · evaluations · programming · class quality<\u002Fdiv><\u002Fdiv><span class=\"owner-chip joe\"><span class=\"g\"><\u002Fspan>Joe<\u002Fspan><\u002Fdiv><p class=\"ct-resp\"><b>Accountable for<\u002Fb> developing coaches, maintaining standards and a consistent member experience in every class.<\u002Fp><\u002Fdiv>\n          <div class=\"cat-card\"><div class=\"ct-top\"><div><span class=\"ct-no\">05<\u002Fspan><div class=\"ct-name\">Admin<\u002Fdiv><div class=\"ct-includes\">Budgeting · payroll · metrics · accounts · reporting · software<\u002Fdiv><\u002Fdiv><span class=\"owner-chip anais\"><span class=\"g\"><\u002Fspan>Anais<\u002Fspan><\u002Fdiv><p class=\"ct-resp\"><b>Accountable for<\u002Fb> keeping the business organised financially and operationally. <span class=\"mono\" style=\"font-size:10.5px;color:var(--ink-60);\">Includes Finances &amp; HR.<\u002Fspan><\u002Fp><\u002Fdiv>\n          <div class=\"cat-card\"><div class=\"ct-top\"><div><span class=\"ct-no\">06<\u002Fspan><div class=\"ct-name\">Facility<\u002Fdiv><div class=\"ct-includes\">Cleaning · equipment · repairs · safety · supplies · appearance<\u002Fdiv><\u002Fdiv><span class=\"owner-chip joe\"><span class=\"g\"><\u002Fspan>Joe<\u002Fspan><\u002Fdiv><p class=\"ct-resp\"><b>Accountable for<\u002Fb> a clean, safe, professional gym that reflects the brand, with maintenance handled quickly.<\u002Fp><\u002Fdiv>\n        <\u002Fdiv>\n        <p class=\"lead reveal\" style=\"margin-top:20px;font-size:13px;color:var(--ink-70);\">Note: the category owner isn't always the one executing every task inside it, open each owner's folder to see exactly who does what. Tasks marked <span class=\"owner-tag both\" style=\"vertical-align:middle;\"><span class=\"ot-g\"><\u002Fspan>Joe &amp; Anais<\u002Fspan> are run together.<\u002Fp>\n      <\u002Fdiv>\n      <span class=\"page-no\">S · 1<\u002Fspan>\n    <\u002Fsection>\n\n    <!-- ================= STEP 5 ================= -->\n    <section class=\"sheet dark flush\" id=\"step5\" data-screen-label=\"Summary, Weekly Meeting\">\n      <div class=\"run-head\" style=\"border-bottom-color:var(--d-bd);color:var(--ink-60);\">\n        <span class=\"rh-mark\"><img src=\"285b29ad-dd22-4413-94b4-80508f3d8077\" alt=\"\" style=\"filter:invert(1) brightness(1.1);\">CrossFit Woolwich<\u002Fspan>\n        <span>Step 5 · Weekly Owner Meeting<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"sheet-inner\">\n        <div class=\"step-hero reveal\" style=\"border:1px solid var(--d-bd);\">\n          <div class=\"blueprint\"><\u002Fdiv>\n          <span class=\"step-badge\"><span class=\"dot\"><\u002Fspan>Step 05 · Weekly Owner Meeting<\u002Fspan>\n          <h2>One hour, off the floor, every week<\u002Fh2>\n          <p class=\"sh-desc\">Locked into the calendar as a recurring, non-negotiable appointment. Off-site on purpose, a different coffee shop each week, so it's a proper reset, not a corridor catch-up.<\u002Fp>\n          <div class=\"assign-ref\">\n            <div class=\"ar-k\">From the assignment<\u002Fdiv>\n            <p>Decide a <b>day, time, length and location<\u002Fb>, then put it on the calendar as recurring. Treat it like a client appointment, non-negotiable. Every week, not “when needed.”<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"mtg-facts reveal\">\n          <div class=\"mtg-fact\"><div class=\"mf-k\">Day<\u002Fdiv><div class=\"mf-v\">Saturday<\u002Fdiv><div class=\"mf-s\">Every week<\u002Fdiv><\u002Fdiv>\n          <div class=\"mtg-fact\"><div class=\"mf-k\">Time<\u002Fdiv><div class=\"mf-v\">12:30<\u002Fdiv><div class=\"mf-s\">Early afternoon<\u002Fdiv><\u002Fdiv>\n          <div class=\"mtg-fact\"><div class=\"mf-k\">Length<\u002Fdiv><div class=\"mf-v\">60 min<\u002Fdiv><div class=\"mf-s\">Kept tight<\u002Fdiv><\u002Fdiv>\n          <div class=\"mtg-fact\"><div class=\"mf-k\">Where<\u002Fdiv><div class=\"mf-v\">Off-site<\u002Fdiv><div class=\"mf-s\">A new coffee shop each week<br>(keeps it fun and exciting)<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n\n        <p class=\"kicker reveal\" style=\"margin:24px 0 12px;color:var(--ink-60);\">The agenda · 60 minutes<\u002Fp>\n        <div class=\"agenda reveal\">\n          <div class=\"ag-item\"><span class=\"ag-no\">01<\u002Fspan><div><div class=\"ag-t\">Scoreboard review<\u002Fdiv><div class=\"ag-pts\"><span class=\"pill\"><span class=\"pd\"><\u002Fspan>Total members<\u002Fspan><span class=\"pill\"><span class=\"pd\"><\u002Fspan>New<\u002Fspan><span class=\"pill\"><span class=\"pd\"><\u002Fspan>Lost<\u002Fspan><span class=\"pill\"><span class=\"pd\"><\u002Fspan>Churn<\u002Fspan><span class=\"pill\"><span class=\"pd\"><\u002Fspan>Revenue<\u002Fspan><span class=\"pill\"><span class=\"pd\"><\u002Fspan>KPIs<\u002Fspan><\u002Fdiv><\u002Fdiv><span class=\"ag-time\">10 min<\u002Fspan><\u002Fdiv>\n          <div class=\"ag-item\"><span class=\"ag-no\">02<\u002Fspan><div><div class=\"ag-t\">Category updates<\u002Fdiv><div class=\"ag-pts\"><span class=\"pill\"><span class=\"pd\"><\u002Fspan>What happened<\u002Fspan><span class=\"pill\"><span class=\"pd\"><\u002Fspan>What's working<\u002Fspan><span class=\"pill\"><span class=\"pd\"><\u002Fspan>Problems<\u002Fspan><span class=\"pill\"><span class=\"pd\"><\u002Fspan>Numbers<\u002Fspan><span class=\"pill\"><span class=\"pd\"><\u002Fspan>What needs support<\u002Fspan><\u002Fdiv><p style=\"font-size:12.5px;color:var(--d-mute);margin-top:9px;\">Joe on Sales · Service · Facility, Anais on Marketing · Retention · Admin.<\u002Fp><\u002Fdiv><span class=\"ag-time\">30 min<\u002Fspan><\u002Fdiv>\n          <div class=\"ag-item\"><span class=\"ag-no\">03<\u002Fspan><div><div class=\"ag-t\">Upcoming priorities<\u002Fdiv><div class=\"ag-pts\"><span class=\"pill\"><span class=\"pd\"><\u002Fspan>Events<\u002Fspan><span class=\"pill\"><span class=\"pd\"><\u002Fspan>Promotions<\u002Fspan><span class=\"pill\"><span class=\"pd\"><\u002Fspan>Staff<\u002Fspan><span class=\"pill\"><span class=\"pd\"><\u002Fspan>Projects<\u002Fspan><span class=\"pill\"><span class=\"pd\"><\u002Fspan>Deadlines<\u002Fspan><\u002Fdiv><\u002Fdiv><span class=\"ag-time\">15 min<\u002Fspan><\u002Fdiv>\n          <div class=\"ag-item\"><span class=\"ag-no\">04<\u002Fspan><div><div class=\"ag-t\">Action items &amp; accountability<\u002Fdiv><div class=\"ag-pts\"><span class=\"pill\"><span class=\"pd\"><\u002Fspan>Clear actions<\u002Fspan><span class=\"pill\"><span class=\"pd\"><\u002Fspan>An owner on each<\u002Fspan><span class=\"pill\"><span class=\"pd\"><\u002Fspan>Deadlines<\u002Fspan><\u002Fdiv><p style=\"font-size:12.5px;color:var(--d-mute);margin-top:9px;\">We end every meeting with a written list of who's doing what, by when.<\u002Fp><\u002Fdiv><span class=\"ag-time\">5 min<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <span class=\"page-no\" style=\"color:var(--ink-60);\">S · 2<\u002Fspan>\n    <\u002Fsection>\n\n    <!-- ================= SIGN-OFF ================= -->\n    <section class=\"sheet flush\" data-screen-label=\"Sign-off\">\n      <div class=\"sheet-inner\">\n        <span class=\"kicker reveal\">Submitted<\u002Fspan>\n        <h2 class=\"reveal\" style=\"font-size:clamp(26px,3.6vw,42px);letter-spacing:-.03em;margin-top:12px;max-width:22ch;\">Five steps, done.<\u002Fh2>\n        <p class=\"lead reveal\" style=\"margin-top:16px;\">We worked through the whole assignment together. Here's the picture as it stands, and we'll keep it current as the business and the team grow.<\u002Fp>\n        <div class=\"recap-list reveal\">\n          <div class=\"recap-item\"><span class=\"tick\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"3\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M5 12.5l4 4 10-10\"><\u002Fpath><\u002Fsvg><\u002Fspan><span class=\"t\"><b>Step 1<\u002Fb> · Our honest self-assessment<\u002Fspan><\u002Fdiv>\n          <div class=\"recap-item\"><span class=\"tick\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"3\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M5 12.5l4 4 10-10\"><\u002Fpath><\u002Fsvg><\u002Fspan><span class=\"t\"><b>Step 2<\u002Fb> · Six categories, one owner each<\u002Fspan><\u002Fdiv>\n          <div class=\"recap-item\"><span class=\"tick\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"3\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M5 12.5l4 4 10-10\"><\u002Fpath><\u002Fsvg><\u002Fspan><span class=\"t\"><b>Step 3<\u002Fb> · 60 specific tasks with cadence and outcomes<\u002Fspan><\u002Fdiv>\n          <div class=\"recap-item\"><span class=\"tick\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"3\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M5 12.5l4 4 10-10\"><\u002Fpath><\u002Fsvg><\u002Fspan><span class=\"t\"><b>Step 4<\u002Fb> · A role sheet each<\u002Fspan><\u002Fdiv>\n          <div class=\"recap-item\"><span class=\"tick\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"3\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M5 12.5l4 4 10-10\"><\u002Fpath><\u002Fsvg><\u002Fspan><span class=\"t\"><b>Step 5<\u002Fb> · A weekly owner meeting, locked in<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"signoff reveal\" style=\"margin-top:46px;\">\n          <div class=\"sign-row\">\n            <div class=\"sign\"><div class=\"sg-line\"><\u002Fdiv><div class=\"sg-name\">Joe<\u002Fdiv><div class=\"sg-role\">Owner-operator · Full-time<\u002Fdiv><\u002Fdiv>\n            <div class=\"sign\"><div class=\"sg-line\"><\u002Fdiv><div class=\"sg-name\">Anais<\u002Fdiv><div class=\"sg-role\">Owner · Part-time<\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n          <p class=\"mono\" style=\"color:var(--ink-60);font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;\">CrossFit Woolwich · Royal Arsenal SE18 · Best Hour Affiliate University · Assignment 01 · June 2026<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <span class=\"page-no\">S · 3<\u002Fspan>\n    <\u002Fsection>\n  <\u002Fdiv>\n\n<\u002Fdiv><!-- /doc -->\n\n\n\n<script src=\"b816e51e-00e2-4175-99f4-247125bbc929\"><\u002Fscript>\n<script src=\"abd865cb-5344-4f5b-8004-1351d8b3f626\"><\u002Fscript>\n<script src=\"ada6f530-1304-47fe-b03e-985789a5ca20\"><\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
